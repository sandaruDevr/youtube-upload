services:
  - type: web
    name: youtube-shorts-uploader
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: YOUTUBE_CLIENT_SECRET_JSON
        sync: false
      - key: OAUTH_REDIRECT_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: YOUTUBE_REFRESH_TOKEN
        sync: false
      - key: MUSIC_TRACK_FILENAME
        value: music.mp3
      - key: DATABASE_URL
        fromDatabase:
          name: youtube-tokens
          property: connectionString

databases:
  - name: youtube-tokens
    plan: free
