    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

    <script>

                        'safe': 'env(safe-area-inset-top)',
                        'safe-b': 'env(safe-area-inset-bottom)',
                    }

            }
        }

    <style>
        .gradient-bg { background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #2d1b69 100%); }
        .card-glow { box-shadow: 0 0 40px rgba(139, 92, 246, 0.15); }
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        input, textarea, select { font-size: 16px; }
        @media (min-width: 640px) {
            input, textarea, select { font-size: 14px; }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <nav class="border-b border-white/10 backdrop-blur-sm bg-black/20 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 text-lg sm:text-xl font-bold">
                <svg class="w-7 h-7 sm:w-8 sm:h-8 text-red-500 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">

                </svg>
                <span class="truncate">Shorts Uploader</span>
            </a>
            <div class="flex items-center gap-2 sm:gap-4 flex-shrink-0">
                {% block nav_actions %}{% endblock %}
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-8 pb-safe-b">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
