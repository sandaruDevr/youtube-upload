{% extends "base.html" %}

{% block title %}Error - Shorts Uploader{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[70vh] text-center px-2">
    <div class="bg-white/5 backdrop-blur-sm rounded-2xl p-6 sm:p-10 card-glow border border-red-500/20 max-w-md w-full">
        <div class="inline-flex items-center justify-center w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-red-500/20 mb-4">
            <svg class="w-7 h-7 sm:w-8 sm:h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
        </div>
        <h1 class="text-xl sm:text-2xl font-bold mb-3">Something went wrong</h1>
        <p class="text-white/60 mb-6 text-sm break-words">{{ error }}</p>
        <a href="/" class="inline-block bg-white/10 hover:bg-white/20 active:bg-white/30 transition-colors text-white font-medium px-6 py-3 rounded-xl touch-manipulation">
            Back to Home
        </a>
    </div>
</div>
{% endblock %}
